name: Build & Deploy to Sakura

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. ソースコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js セットアップ（npm キャッシュ有効）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 依存パッケージインストール
      - name: Install dependencies
        run: npm ci

      # 4. 環境変数ファイル生成（GitHub Secretsから）
      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SAKURA_API_URL=${{ secrets.NEXT_PUBLIC_SAKURA_API_URL }}" > .env.local

      # 5. Next.js 静的ビルド（out/ フォルダが生成される）
      - name: Build Next.js
        run: npm run build

      # 6. Python ftplib.FTP_TLS で out/ をさくらサーバーへ転送
      - name: Deploy to Sakura via FTP (Python)
        env:
          FTP_HOST: mdl-japan.sakura.ne.jp
          FTP_USER: mdl-japan
          FTP_PASS: ${{ secrets.SAKURA_FTP_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import ftplib
          import os
          import ssl

          HOST = os.environ['FTP_HOST']
          USER = os.environ['FTP_USER']
          PASS = os.environ['FTP_PASS']
          LOCAL_DIR = 'out'
          REMOTE_BASE = '/www/sharopass'

          def ensure_dir(ftp, path):
              parts = [p for p in path.split('/') if p]
              cur = ''
              for p in parts:
                  cur += '/' + p
                  try:
                      ftp.mkd(cur)
                  except:
                      pass

          def upload_dir(ftp, local_dir, remote_dir):
              ensure_dir(ftp, remote_dir)
              for item in os.listdir(local_dir):
                  local_path = os.path.join(local_dir, item)
                  remote_path = remote_dir + '/' + item
                  if os.path.isdir(local_path):
                      upload_dir(ftp, local_path, remote_path)
                  else:
                      try:
                          with open(local_path, 'rb') as f:
                              ftp.storbinary(f'STOR {remote_path}', f)
                          print(f'  ✓ {remote_path}')
                      except Exception as e:
                          print(f'  ✗ {remote_path}: {e}')

          # まずFTPS(TLS)で試行、失敗したら通常FTPにフォールバック
          ftp = None
          try:
              print(f'Connecting via FTPS to {HOST}...')
              ctx = ssl.create_default_context()
              ctx.check_hostname = False
              ctx.verify_mode = ssl.CERT_NONE
              ftp = ftplib.FTP_TLS(context=ctx)
              ftp.connect(HOST, 21, timeout=60)
              ftp.login(USER, PASS)
              ftp.prot_p()
              ftp.set_pasv(True)
              print('Connected via FTPS.')
          except Exception as e:
              print(f'FTPS failed ({e}), trying plain FTP...')
              ftp = ftplib.FTP()
              ftp.connect(HOST, 21, timeout=60)
              ftp.login(USER, PASS)
              ftp.set_pasv(True)
              print('Connected via FTP.')

          print(f'Uploading {LOCAL_DIR}/ → {REMOTE_BASE}/')
          upload_dir(ftp, LOCAL_DIR, REMOTE_BASE)

          api_local = 'sakura-api'
          api_remote = '/www/sharopass/sakura-api'
          if os.path.exists(api_local):
              print(f'Uploading {api_local}/ → {api_remote}/')
              upload_dir(ftp, api_local, api_remote)

          ftp.quit()
          print('✅ Deploy complete!')
          PYEOF
