name: Deploy to Sakura Server

on:
  push:
    branches:
      - main  # mainブランチへのpushで自動デプロイ

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. ソースコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.jsをセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 依存関係をインストール
      - name: Install dependencies
        run: npm ci

      # 4. .env.local を作成（GitHub Secretsから）
      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SAKURA_API_URL=${{ secrets.NEXT_PUBLIC_SAKURA_API_URL }}" > .env.local

      # 5. Next.jsをビルド（静的エクスポート）
      - name: Build
        run: npm run build

      # 6. out/ フォルダをさくらサーバーにSFTPでアップロード
      - name: Deploy to Sakura via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SAKURA_USER }}
          server: ${{ secrets.SAKURA_HOST }}
          password: ${{ secrets.SAKURA_PASSWORD }}
          port: 22
          local_path: './out/*'
          remote_path: '/home/mdl-japan/www/sharopass/'
          delete_remote_files: false

      # 7. PHP APIをさくらサーバーにアップロード（変更があった場合）
      - name: Deploy PHP API to Sakura
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SAKURA_USER }}
          server: ${{ secrets.SAKURA_HOST }}
          password: ${{ secrets.SAKURA_PASSWORD }}
          port: 22
          local_path: './sakura-api/*'
          remote_path: '/home/mdl-japan/www/sharopass/sakura-api/'
          delete_remote_files: false
