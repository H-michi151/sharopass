name: Build & Deploy to Sakura

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. ソースコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js セットアップ（npm キャッシュ有効）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 依存パッケージインストール
      - name: Install dependencies
        run: npm ci

      # 4. 環境変数ファイル生成（GitHub Secretsから）
      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SAKURA_API_URL=${{ secrets.NEXT_PUBLIC_SAKURA_API_URL }}" > .env.local

      # 5. Next.js 静的ビルド（out/ フォルダが生成される）
      - name: Build Next.js
        run: npm run build

      # 6. lftp で SFTP/FTP 経由でさくらサーバーへ転送
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Sakura via lftp
        env:
          FTP_HOST: mdl-japan.sakura.ne.jp
          FTP_USER: mdl-japan
          FTP_PASS: ${{ secrets.SAKURA_FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open ftp://$FTP_USER:$FTP_PASS@$FTP_HOST;
            mirror --reverse --delete --verbose out/ /www/sharopass/;
            mirror --reverse --delete --verbose sakura-api/ /www/sharopass/sakura-api/;
            bye
          "
