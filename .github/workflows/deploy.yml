name: Build & Deploy to Sakura

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. ソースコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js セットアップ（npm キャッシュ有効）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 依存パッケージインストール
      - name: Install dependencies
        run: npm ci

      # 4. 環境変数ファイル生成（GitHub Secretsから）
      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SAKURA_API_URL=${{ secrets.NEXT_PUBLIC_SAKURA_API_URL }}" > .env.local

      # 5. Next.js 静的ビルド（out/ フォルダが生成される）
      - name: Build Next.js
        run: npm run build

      # 6. SSH秘密鍵を設定
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SAKURA_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H mdl-japan.sakura.ne.jp >> ~/.ssh/known_hosts 2>/dev/null

      # 7. rsync over SSH でさくらサーバーへ転送
      - name: Deploy to Sakura via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22" \
            out/ \
            mdl-japan@mdl-japan.sakura.ne.jp:/home/mdl-japan/www/sharopass/

          # sakura-api も転送
          if [ -d sakura-api ]; then
            rsync -avz --delete \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22" \
              sakura-api/ \
              mdl-japan@mdl-japan.sakura.ne.jp:/home/mdl-japan/www/sharopass/sakura-api/
          fi

          echo "✅ Deploy complete!"
